<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book a time</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent !important; }
    body { display: flex; justify-content: center; padding: 8px; box-sizing: border-box; }
    #rms-scheduler { width: 100%; }
  </style>
</head>
<body>
  <div id="rms-scheduler"></div>

  <!-- Static tag: reliably runs inside sandboxed iframes (e.g. Figma Sites). -->
  <script
    src="scheduler.js"
    data-endpoint="https://script.google.com/macros/s/AKfycbxWJC_Y2T37JZIvZszOQw9akjr3PbOKsfIkVzJCrweSioxoYfXzoolv_4y8phA8hxcTIw/exec"
    data-title="Book a time with me"></script>

  <!-- Theme from URL query params, e.g.
       embed.html?accent=%23f4e04d&bg=transparent&fg=%23ffffff
       params: accent, contrast, dot, bg, surface, fg, muted, border -->
  <script>
    (function () {
      var el = document.getElementById('rms-scheduler');
      var q = new URLSearchParams(location.search);
      var map = {
        accent: '--rmssch-accent', contrast: '--rmssch-accent-contrast', dot: '--rmssch-avail-dot',
        bg: '--rmssch-bg', surface: '--rmssch-surface', fg: '--rmssch-fg',
        muted: '--rmssch-muted', border: '--rmssch-border'
      };
      // Transparent card by default so the widget blends into the host page.
      el.style.setProperty('--rmssch-bg', q.get('bg') || 'transparent');
      Object.keys(map).forEach(function (k) {
        if (k === 'bg') return;
        var v = q.get(k); if (v) el.style.setProperty(map[k], v);
      });
    })();
  </script>
</body>
</html>
