<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book a time</title>
  <!-- Warm up connections so the font + availability fetch start sooner. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com">
  <style>
    html, body { margin: 0; padding: 0; background: transparent !important; }
    body { display: flex; justify-content: center; box-sizing: border-box; }
    #rms-scheduler { width: 100%; }
  </style>
</head>
<body>
  <div id="rms-scheduler"></div>

  <!-- Static tag: reliably runs inside sandboxed iframes (e.g. Figma Sites). -->
  <script
    src="scheduler.js?v=548bf021"
    data-endpoint="https://script.google.com/macros/s/AKfycbxWJC_Y2T37JZIvZszOQw9akjr3PbOKsfIkVzJCrweSioxoYfXzoolv_4y8phA8hxcTIw/exec"
    data-title="Choose a time with Rafael"
    data-host-name="Rafael Matos da Silva"
    data-host-avatar="avatar.png"
    data-location="Google Meet link sent after you book."
    data-pending-note="In-person sessions require a LisboaUX co-working day ticket."></script>

  <!-- Theme from URL query params. Defaults to a solid DARK card so text is
       always legible regardless of the viewer's OS mode. Examples:
         ?theme=light                 (light card)
         ?bg=transparent              (see-through — use over a dark section)
         ?accent=%23ff5c00            (custom accent; %23 = #)
       params: theme, bg, accent, contrast, dot, surface, fg, muted, border -->
  <script>
    (function () {
      var el = document.getElementById('rms-scheduler');
      var q = new URLSearchParams(location.search);
      var PAL = {
        dark:  { '--rmssch-surface': 'rgba(255,255,255,0.08)', '--rmssch-fg': 'rgba(255,255,255,0.95)', '--rmssch-muted': 'rgba(255,255,255,0.5)', '--rmssch-border': 'rgba(255,255,255,0.12)' },
        light: { '--rmssch-surface': 'rgba(0,0,0,0.05)', '--rmssch-fg': 'rgba(0,0,0,0.9)', '--rmssch-muted': 'rgba(0,0,0,0.5)', '--rmssch-border': 'rgba(0,0,0,0.1)' }
      };
      var theme = (q.get('theme') === 'light') ? 'light' : 'dark';
      // Match the iframe's color-scheme to the rendered theme. Without this,
      // a scheme mismatch with the parent makes the browser paint an opaque
      // (usually white) canvas behind the iframe instead of staying transparent.
      document.documentElement.style.colorScheme = theme;
      // Accept bare hex (no #, since # breaks a URL): 171711 -> #171711
      function color(v) { return /^[0-9a-fA-F]{3,8}$/.test(v) ? '#' + v : v; }
      // opacity=0..1 (1 = 100%, 0.5 = 50%) applied to a 6-digit bg hex.
      function hexAlpha(o) { var a = Math.round(Math.max(0, Math.min(1, parseFloat(o))) * 255).toString(16); return (a.length < 2 ? '0' : '') + a; }
      var bg = q.get('bg'), op = q.get('opacity');
      if (bg && op !== null && /^[0-9a-fA-F]{6}$/.test(bg)) bg += hexAlpha(op);
      var pal = PAL[theme];
      for (var p in pal) el.style.setProperty(p, pal[p]);
      el.style.setProperty('--rmssch-bg', bg ? color(bg) : (theme === 'dark' ? '#16181d' : '#ffffff'));
      var tokens = {
        accent: '--rmssch-accent', contrast: '--rmssch-accent-contrast', dot: '--rmssch-avail-dot',
        surface: '--rmssch-surface', fg: '--rmssch-fg', muted: '--rmssch-muted', border: '--rmssch-border'
      };
      Object.keys(tokens).forEach(function (k) { var v = q.get(k); if (v) el.style.setProperty(tokens[k], color(v)); });
      // Fill 100% of the iframe box by DEFAULT so the widget is a constant size
      // across every step (picker, form, confirmation) — you size it via the
      // Figma frame. Opt out with ?fill=0 for content-height + the auto-resize
      // listener below (tall content scrolls inside when the box is shorter).
      if (q.get('fill') !== '0') {
        document.documentElement.style.height = '100%';
        document.body.style.height = '100%';
        el.style.height = '100%';
      }
    })();
  </script>

  <!-- Report our height to the parent so it can auto-resize the iframe. -->
  <script>
    (function () {
      var el = document.getElementById('rms-scheduler');
      var last = 0;
      function post() {
        var h = Math.ceil(el ? el.getBoundingClientRect().height : document.documentElement.scrollHeight);
        if (h && h !== last) { last = h; try { parent.postMessage({ type: 'rmssch:height', height: h }, '*'); } catch (e) {} }
      }
      if ('ResizeObserver' in window && el) new ResizeObserver(post).observe(el);
      window.addEventListener('load', post);
      window.addEventListener('resize', post);
      setTimeout(post, 300); setTimeout(post, 1200);
    })();
  </script>
</body>
</html>
